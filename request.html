<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d47a1">
    <title>Campus Electrical Support Portal</title>
    <link rel="stylesheet" href="req.css">
</head>

<body>

<section class="req">

    <h1> UY Electrical Service Request</h1>

    <p class="subtitle">
        Report electrical faults and maintenance issues on campus and off-campus.
    </p>

    <form id="serviceRequestForm">

        <div class="Name">
            <label>
                Name 🫥
                <input type="text" id="customerName" placeholder="Name" required>
            </label>
        </div>

        <div class="Name">
            <label>
                Phone No
                <input type="number" id="phone" placeholder="Phone Number" required>
            </label>
        </div>

        <div class="Name">
            <label>Location</label>

            <select id="location" name="location" required>
                <option value="">Select Location</option>
                <option value="Hostel A">Hostel A</option>
                <option value="Hostel B">Hostel B</option>
                <option value="Lecture Hall">Lecture Hall</option>
                <option value="Off Campus">Off Campus</option>
            </select>
        </div>

        <div class="Name">
            <label>
                Area
                <input type="text" id="area" placeholder="Area">
            </label>
        </div>

        <div class="Name">
            <label>
                Local Bus Stop 🚏
                <input type="text" id="busStop" placeholder="Bus Stop">
            </label>
        </div>

        <div class="Name">
            <label>
                Residential Address
                <input type="text" id="address" placeholder="Residential Address">
            </label>
        </div>

        <div class="Name">
            <label>
                Description

                <textarea
                    id="description"
                    name="description"
                    rows="5"
                    cols="40"
                    placeholder="Enter your description here..."
                    required></textarea>

            </label>
        </div>

        <div>

            <h3>Urgency</h3>

            <div class="checkbox">
                <label>
                    <input type="radio" name="urgency" value="Low">
                    Low 🤏
                </label>
            </div>

            <div class="checkbox">
                <label>
                    <input type="radio" name="urgency" value="Medium">
                    Medium ⚡
                </label>
            </div>

            <div class="checkbox">
                <label>
                    <input type="radio" name="urgency" value="High">
                    High 💥
                </label>
            </div>

        </div>

        <button type="submit">
            Submit Request ✅
        </button>
        <p id="successMessage"></p>

    </form>
  <a href="index.html">
        <button>
            Exit👈
        </button>
                </a>
</section>


<script type="module" src="request.js"></script>

</body>
</html>
