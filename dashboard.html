<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Dashboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1{
    color:#0d47a1;
}

.request-card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.status{
    font-weight:bold;
}

.accept{
    background:#28a745;
    color:white; 
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.decline{
    background:#dc3545;
    color:white;
     padding: 10px;
    border-radius: 10px;
    border: none;
}

.complete{
    background:#0d47a1;
    color:white;
     padding: 10px;
    border-radius: 10px;
    border: none;
}
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.stat-card h3{
    margin-bottom:10px;
    color:#0d47a1;
}

.stat-card span{
    font-size:28px;
    font-weight:bold;
}
.search-box{
    margin:20px;
}

.search-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}
.whatsapp{
    background:#25D366;
    color:white;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.assign{
background:#6f42c1;
color:white;

}

/* Technician Dropdown */
.technician-select{
    width:100%;
    padding:12px 15px;
    margin:12px 0;
    border:2px solid #e0e0e0;
    border-radius:10px;
    background:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    outline:none;
    transition:0.3s ease;
}

.technician-select:hover{
    border-color:#0d47a1;
}

.technician-select:focus{
    border-color:#0d47a1;
    box-shadow:0 0 8px rgba(13,71,161,.25);
}

/* Optional label */

.technician-label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    font-weight:bold;
    color:#0d47a1;
}

/* Assigned Technician Badge */

.tech-badge{
    display:inline-block;
    background:#e8f5e9;
    color:#28a745;
    padding:6px 12px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
    margin-top:10px;
}
.delete{
    background:#333;
    color:white;
}

.delete:hover{
    background:#000;
}
.history-btn{

background:#28a745;
color:white;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;

}
.histor-btn{

background:#28a7;
color:white;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
margin-right: 20px;
border: none;
margin-left: 20px;

}

</style>

</head>

<body>

<h1>Service Requests Dashboard</h1>
<div class="search-box">
    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search requests...">
</div>
<div class="stats">

    <div class="stat-card">
        <h3>Total</h3>
        <span id="totalCount">0</span>
    </div>

    <div class="stat-card">
        <h3>Pending</h3>
        <span id="pendingCount">0</span>
    </div>
    <div class="stat-card">
        <h3>Accepted</h3>
        <span id="acceptedCount">0</span>
    </div>

    <div class="stat-card">
        <h3>Declined</h3>
        <span id="declinedCount">0</span>
    </div>

    <div class="stat-card">
        <h3>Completed</h3>
        <span id="completedCount">0</span>
    </div>

</div>
<div id="requestsContainer"></div>
<a href="staff.html"
class="histor-btn">
Logout
</a>
<a
href="history.html"
class="history-btn">

View History

</a>

<button
class="histor-btn" 
onclick="location.href='technician.html'">

Manage Technicians

</button>

<script type="module" src="dashboard.js"></script>

</body>
</html>
